
<a href="https://calendar.google.com/calendar/ical/{{ .Get "icalid" }}/public/basic.ics">calendar.ics</a><br/>
<br/>

{{ $height:= 600 }}
{{ if .Get "height" }}
  {{ $height = .Get "height" }}
{{ end }}

{{ $width:= 800 }}
{{ if .Get "width" }}
  {{ $width = .Get "width" }}
{{ end }}


<iframe src="https://calendar.google.com/calendar/embed?
height={{ $height }}&
wkst=1&
bgcolor=%23ffffff&
ctz=America%2FHalifax&
mode=AGENDA&
showNav=0&
showPrint=0&
showTabs=0&
showCalendars=0&
showTitle=1&
src={{ .Get "src" }}&
color=%23ffffff"
style="background-color:#ffffff;color=white;border-radius: 0.25em;padding:10px;box-shadow:1px 1px 5px grey; display:inline;"
width="{{ $width }}"
height="{{ $height }}"
frameborder="0"
scrolling="no">
</iframe>
<div style="display:inline;vertical-align:top;min-width:{{ $width }}px" width="40%">
<picture style="display:inline;">
<source style="display:inline;" srcset="../img/calendar_2026_400.png">
<img  style="display:inline;vertical-align:top;min-width:{{ $width }}px" width="40%" alt="A group of people, including many children, are gathered in a pedestrian plaza. They are outside a large glass building, with brick buildings in the background. Many bicycles, of various shapes and sizes, are also parked in the plaza, among all of the people."  src="../img/calendar_2026_400.png"></img>
</picture>
<div style="padding-left:20px;font-size:0.75em;text-align:right;width:65%;min-width:{{ $width }}px;">Photo Credit to Margo Gesser</div>
</div>
